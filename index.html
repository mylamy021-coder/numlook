<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NumVerify - Smart Lookup</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <header>
            <h1><i class="fas fa-search-location"></i> NumLookup<span>100</span></h1>
            <p>সহজেই যেকোনো ফোন নাম্বারের তথ্য খুঁজে বের করুন</p>
        </header>

        <div class="search-box">
            <input type="text" id="phoneNumber" placeholder="যেমন: +88017XXXXXXXX" autocomplete="off">
            <button onclick="lookupNumber()" id="searchBtn">অনুসন্ধান করুন</button>
        </div>

        <div id="loader" class="loader" style="display: none;"></div>

        <div id="resultCard" class="result-card" style="display: none;">
            <div class="card-header">
                <h3>ফলাফল</h3>
            </div>
            <div class="card-body" id="resultContent">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
